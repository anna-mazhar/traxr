name: Deploy site

# Landing page at the Pages root, MkDocs docs under /docs/ — one artifact.
# Requires GitHub Pages to be enabled with "GitHub Actions" as the source.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: make install
      - name: Assemble site
        run: make site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: staging

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
